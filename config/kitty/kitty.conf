# Font
font_family      Plemol35JP Console NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Window
window_padding_width 8 

# Scrollback
scrollback_lines 10000

# Transparency
background_opacity 0.9

# Cursor
cursor_shape block
cursor_blink_interval 0

# Mouse
mouse_hide_wait 3.0

# URL handling
open_url_with xdg-open

# Key bindings
map shift+return send_text all \x1b\x0d

# BEGIN_KITTY_THEME
# Tomorrow Night
include current-theme.conf
# include dank-theme.conf
# END_KITTY_THEME
